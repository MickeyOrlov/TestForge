name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *" # nightly container-backed suite

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.console=plain

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and run example suite
        run: ./gradlew build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/test-results/test/
            **/build/reports/tests/test/
          if-no-files-found: ignore

  heavy-suites:
    name: Container- and browser-backed examples
    runs-on: ubuntu-latest # Docker and browser deps available out of the box
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Testcontainers-backed suite
        run: ./gradlew :example-tests:containersTest

      - name: Install Chromium and run browser suite
        run: ./gradlew :module-web-playwright:playwrightInstall :example-tests:browsersTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-suite-reports
          path: |
            **/build/test-results/containersTest/
            **/build/test-results/browsersTest/
            build/playwright-artifacts/
          if-no-files-found: ignore

  docker-runner-image:
    name: Docker runner image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build CI runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: testforge-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
