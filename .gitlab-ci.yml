stages:
  - verify
  - package
  - test

variables:
  # Default: public JDK image, dependencies download on every run.
  # After building the runner image (manual job below), override this in
  # CI/CD settings with $CI_REGISTRY_IMAGE/runner:latest for warm runs.
  RUNNER_IMAGE: "eclipse-temurin:26-jdk-noble"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.console=plain"

default:
  image: $RUNNER_IMAGE
  interruptible: true

# Framework self-check: compiles everything, runs the offline example suite.
build:
  stage: verify
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - chmod +x gradlew
    - ./gradlew build
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/test/TEST-*.xml"

# --- environment runs --------------------------------------------------------
# One manual job per environment. Secrets (DB passwords, tokens, mock admin
# credentials) come from masked CI/CD variables or Vault — never from this file.
.environment-test:
  stage: test
  rules:
    - when: manual
  script:
    - chmod +x gradlew
    - ./gradlew :example-tests:test -DtestEnv=$TEST_ENV
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/test/TEST-*.xml"

# Copy this block per environment during adaptation (qa, staging, ...).
environment-example:
  extends: .environment-test
  variables:
    TEST_ENV: "example"

# Container-backed examples (real Postgres via Testcontainers). Manual /
# nightly: the default build stays offline by design.
containers-test:
  stage: test
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: "docker"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: manual
  script:
    - chmod +x gradlew
    - ./gradlew :example-tests:containersTest
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/containersTest/TEST-*.xml"

# --- runner image ------------------------------------------------------------
# Bakes JDK + Gradle dependency cache + Chromium into an image in the project
# registry. Re-run after dependency upgrades.
build-runner-image:
  stage: package
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - when: manual
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE/runner:latest" .
    - docker push "$CI_REGISTRY_IMAGE/runner:latest"
