dependencies {
    testImplementation platform(libs.spring.boot.dependencies)

    testImplementation project(":core")
    testImplementation project(":module-contract")
    testImplementation project(":module-data")
    testImplementation project(":module-db")
    testImplementation project(":module-flow")
    testImplementation project(":module-kafka")
    testImplementation project(":module-mock")
    testImplementation project(":module-reporting")
    testImplementation project(":module-web")

    testImplementation "org.springframework.boot:spring-boot-starter-test"
